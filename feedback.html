<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Feedback Form</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }
    .container {
      background: white;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 420px;
      text-align: center;
    }
    h2 {
      color: #1e3c72;
      margin-bottom: 20px;
    }
    label {
      display: block;
      text-align: left;
      margin: 10px 0 5px;
      font-weight: 600;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    input:focus, textarea:focus {
      border-color: #1e3c72;
      outline: none;
    }
    button {
      background: #1e3c72;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }
    button:hover {
      background: #16335a;
    }
    .rating {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
    }
    .star {
      font-size: 30px;
      cursor: pointer;
      color: #ccc;
      transition: transform 0.2s ease, color 0.3s ease;
    }
    .star:hover,
    .star.hovered,
    .star.active {
      color: gold;
      transform: scale(1.2);
    }
    .char-counter {
      text-align: right;
      font-size: 12px;
      color: #555;
      margin-top: -10px;
      margin-bottom: 10px;
    }
    .success-message {
      background: #e0f7e9;
      color: #2a7c4e;
      padding: 10px;
      border-radius: 5px;
      display: none;
      animation: fadeIn 0.5s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Event Feedback</h2>
  <div class="success-message" id="successMsg">✅ Thank you for your feedback!</div>
  <form id="feedbackForm">
    <label>Rate the Event</label>
    <div class="rating" id="starContainer">
      <span class="star" data-value="1">&#9733;</span>
      <span class="star" data-value="2">&#9733;</span>
      <span class="star" data-value="3">&#9733;</span>
      <span class="star" data-value="4">&#9733;</span>
      <span class="star" data-value="5">&#9733;</span>
    </div>
    <input type="hidden" id="ratingValue" value="0" required>

    <label for="feedback">Your Feedback</label>
    <textarea id="feedback" placeholder="Share your experience" rows="4" maxlength="250" required></textarea>
    <div class="char-counter" id="charCounter">0 / 250</div>

    <label for="email">Your Email (Optional)</label>
    <input type="email" id="email" placeholder="Enter your email">

    <button type="submit" id="submitBtn">Submit Feedback</button>
  </form>
</div>

<script>
  const stars = document.querySelectorAll('.star');
  const ratingInput = document.getElementById('ratingValue');
  const feedbackForm = document.getElementById('feedbackForm');
  const successMsg = document.getElementById('successMsg');
  const feedbackInput = document.getElementById('feedback');
  const charCounter = document.getElementById('charCounter');
  const submitBtn = document.getElementById('submitBtn');

  let currentRating = 0;

  stars.forEach(star => {
    star.addEventListener('click', () => {
      currentRating = +star.dataset.value;
      ratingInput.value = currentRating;
      updateStars(currentRating);
    });
    star.addEventListener('mouseover', () => {
      updateStars(+star.dataset.value, true);
    });
    star.addEventListener('mouseout', () => {
      updateStars(currentRating);
    });
  });

  function updateStars(rating, preview = false) {
    stars.forEach((star, index) => {
      if (preview) {
        star.classList.toggle('hovered', index < rating);
      } else {
        star.classList.remove('hovered');
        star.classList.toggle('active', index < rating);
      }
    });
  }

  feedbackInput.addEventListener('input', () => {
    charCounter.textContent = `${feedbackInput.value.length} / 250`;
  });

  feedbackForm.addEventListener('submit', function(event) {
    event.preventDefault();

    const rating = +ratingInput.value;
    const feedback = feedbackInput.value.trim();
    const email = document.getElementById('email').value.trim();

    if (rating === 0) {
      alert("Please select a rating before submitting.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    // Simulate storing or sending data
    setTimeout(() => {
      localStorage.setItem("eventFeedback", JSON.stringify({ rating, feedback, email }));

      successMsg.style.display = "block";
      feedbackForm.reset();
      charCounter.textContent = "0 / 250";
      updateStars(0);
      currentRating = 0;

      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Feedback";

      setTimeout(() => {
        successMsg.style.display = "none";
      }, 4000);
    }, 1200);
  });
</script>

</body>
</html>
